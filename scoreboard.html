<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard — La Bataille des Royaumes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#05070e;
      --bg2:#0b1223;
      --text:#f7f0e6;
      --muted:#b8af9f;
      --gold:#e0ba73;
      --gold-soft:#f4ddb1;
      --gold-strong:#ffd98a;
      --line:rgba(255,255,255,.08);
      --panel:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      --shadow:0 28px 70px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:"Cormorant Garamond", serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(224,186,115,.10), transparent 30%),
        radial-gradient(circle at 16% 20%, rgba(82,125,255,.10), transparent 20%),
        radial-gradient(circle at 85% 18%, rgba(153,84,255,.10), transparent 22%),
        linear-gradient(180deg, #09101d 0%, #04070d 100%);
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.28;
      background-image:
        radial-gradient(2px 2px at 10% 15%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 22% 78%, rgba(255,255,255,.5) 40%, transparent 45%),
        radial-gradient(2px 2px at 39% 18%, rgba(255,255,255,.42) 40%, transparent 45%),
        radial-gradient(1px 1px at 57% 12%, rgba(255,255,255,.65) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 74% 69%, rgba(255,255,255,.52) 40%, transparent 45%),
        radial-gradient(2px 2px at 89% 19%, rgba(255,255,255,.45) 40%, transparent 45%),
        radial-gradient(1px 1px at 83% 84%, rgba(255,255,255,.40) 40%, transparent 45%);
    }

    .screen{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:18px;
      padding:22px 24px 18px;
      position:relative;
      z-index:1;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:24px;
    }

    .title-wrap{
      display:flex;
      align-items:flex-start;
      gap:16px;
      min-width:0;
    }

    .title-wrap img{
      width:82px;
      height:82px;
      object-fit:contain;
      flex-shrink:0;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }

    .eyebrow{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.72rem;
      color:var(--gold);
      margin-bottom:6px;
    }

    h1{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:clamp(2rem, 3.2vw, 3.2rem);
      line-height:1;
      text-wrap:balance;
    }

    .top-right{
      text-align:right;
      padding-top:10px;
      flex-shrink:0;
    }

    .top-right .label{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.70rem;
      color:var(--muted);
    }

    .top-right .value{
      margin-top:4px;
      font-family:"Cinzel", serif;
      font-size:1rem;
      color:#f0e6cf;
    }

    .main{
      display:grid;
      grid-template-columns:1fr 1.02fr;
      gap:24px;
      min-height:0;
    }

    .panel{
      border-radius:32px;
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      min-height:0;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.04), transparent 18%),
        radial-gradient(circle at 88% 86%, rgba(255,255,255,.03), transparent 18%);
    }

    /* LEFT / LEADER */
    .leader-panel{
      padding:28px 28px 24px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      min-height:0;
      position:relative;
      isolation:isolate;
    }

    .leader-panel::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 42%, rgba(224,186,115,.11), transparent 36%),
        radial-gradient(circle at 50% 42%, rgba(255,217,138,.07), transparent 18%);
      pointer-events:none;
      z-index:0;
    }

    .leader-top,
    .leader-middle,
    .leader-bottom{
      position:relative;
      z-index:1;
      display:grid;
      justify-items:center;
      text-align:center;
    }

    .leader-top{
      gap:10px;
      align-self:start;
    }

    .leader-top .small{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.76rem;
      color:var(--gold);
    }

    .leader-top h2{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:clamp(1.8rem, 3vw, 3rem);
      line-height:1.03;
    }

    .leader-middle{
      align-self:center;
      width:100%;
      min-height:0;
    }

    .leader-frame{
      position:relative;
      width:min(70%, 360px);
      aspect-ratio:1/1;
      border-radius:34px;
      display:grid;
      place-items:center;
      padding:20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 20px 40px rgba(0,0,0,.24),
        inset 0 0 0 1px rgba(255,255,255,.03);
      overflow:hidden;
    }

    .leader-frame.top-1{
      border:1px solid rgba(255,217,138,.45);
      box-shadow:
        0 0 0 1px rgba(255,217,138,.10),
        0 18px 42px rgba(0,0,0,.28),
        0 0 38px rgba(224,186,115,.16),
        inset 0 0 24px rgba(255,217,138,.05);
    }

    .leader-frame::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:36px;
      pointer-events:none;
      background:
        radial-gradient(circle at 16% 18%, rgba(255,236,184,.50), transparent 10%),
        radial-gradient(circle at 83% 20%, rgba(255,236,184,.32), transparent 8%),
        radial-gradient(circle at 24% 80%, rgba(255,236,184,.22), transparent 7%),
        radial-gradient(circle at 72% 76%, rgba(255,236,184,.30), transparent 8%);
      opacity:.85;
      mix-blend-mode:screen;
    }

    .sparkle{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,245,210,.95), rgba(255,217,138,.55), transparent 72%);
      filter:blur(.2px);
      opacity:.8;
      animation:sparkleFloat 3.8s ease-in-out infinite;
      pointer-events:none;
    }

    .sparkle.s1{ top:10%; left:13%; animation-delay:0s; }
    .sparkle.s2{ top:18%; right:12%; animation-delay:.8s; }
    .sparkle.s3{ bottom:16%; left:10%; animation-delay:1.4s; }
    .sparkle.s4{ bottom:10%; right:15%; animation-delay:2.1s; }
    .sparkle.s5{ top:50%; left:6%; animation-delay:2.7s; }
    .sparkle.s6{ top:44%; right:7%; animation-delay:1.1s; }

    .leader-logo{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      display:block;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.25));
      position:relative;
      z-index:1;
    }

    .leader-bottom{
      align-self:end;
      gap:6px;
    }

    .leader-line{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.72rem;
      color:#f0d9a0;
    }

    .leader-name{
      font-family:"Cinzel", serif;
      font-size:clamp(2rem, 3vw, 3.2rem);
      line-height:1.04;
      max-width:90%;
      text-wrap:balance;
    }

    .leader-score{
      font-family:"Cinzel", serif;
      font-size:clamp(3rem, 5.2vw, 5rem);
      line-height:1;
      color:var(--gold-soft);
      text-shadow:0 0 22px rgba(224,186,115,.25);
    }

    /* RIGHT / RANKING */
    .ranking-panel{
      padding:18px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:14px;
      min-height:0;
    }

    .ranking-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }

    .ranking-head h2{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:1.22rem;
    }

    .refresh-badge{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      font-family:"Cinzel", serif;
      font-size:.70rem;
      letter-spacing:.06em;
      color:var(--muted);
      white-space:nowrap;
    }

    .pulse-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#7ef0a8;
      box-shadow:0 0 12px #7ef0a8;
      animation:pulseDot 1.8s infinite;
      flex-shrink:0;
    }

    .ranking-list{
      display:grid;
      gap:10px;
      align-content:start;
      min-height:0;
      overflow:hidden;
    }

    .ranking-item{
      position:relative;
      display:grid;
      grid-template-columns:70px 56px minmax(0,1fr) 110px;
      align-items:center;
      gap:14px;
      min-height:68px;
      padding:10px 18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.07);
      overflow:hidden;
      isolation:isolate;
    }

    .ranking-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, var(--itemGlow), transparent 68%);
      opacity:.34;
      pointer-events:none;
      z-index:0;
    }

    .ranking-item.top-1{
      border-color:rgba(255,217,138,.34);
      box-shadow:
        0 0 0 1px rgba(255,217,138,.08),
        inset 0 0 24px rgba(255,217,138,.05),
        0 0 22px rgba(224,186,115,.08);
    }

    .rank-num,
    .rank-logo,
    .rank-name,
    .rank-score{
      position:relative;
      z-index:1;
    }

    .rank-num{
      display:grid;
      place-items:center;
      height:100%;
      font-family:"Cinzel", serif;
      font-size:1.12rem;
      color:#f1e5c8;
      text-align:center;
    }

    .rank-logo{
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      justify-self:center;
      border-radius:14px;
      padding:6px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
    }

    .rank-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      display:block;
    }

    .rank-name{
      display:flex;
      align-items:center;
      min-width:0;
      height:100%;
      font-family:"Cinzel", serif;
      font-size:1rem;
      line-height:1.08;
    }

    .rank-name span{
      display:block;
      width:100%;
      text-wrap:balance;
    }

    .rank-score{
      display:grid;
      align-items:center;
      justify-items:end;
      height:100%;
      text-align:right;
      font-family:"Cinzel", serif;
      font-size:1.45rem;
      line-height:1;
      color:var(--itemAccent);
      text-shadow:0 0 18px var(--itemGlow);
    }

    /* CHANGE ANIMATIONS */
    .score-flash{
      animation:scoreFlash .7s ease;
    }

    .row-flash{
      animation:rowFlash .85s ease;
    }

    .leader-flash{
      animation:leaderFlash .9s ease;
    }

    @keyframes pulseDot{
      0%{transform:scale(1);opacity:1}
      50%{transform:scale(1.35);opacity:.65}
      100%{transform:scale(1);opacity:1}
    }

    @keyframes sparkleFloat{
      0%,100%{transform:translateY(0) scale(1);opacity:.45}
      50%{transform:translateY(-8px) scale(1.2);opacity:1}
    }

    @keyframes scoreFlash{
      0%{transform:scale(1); filter:brightness(1);}
      35%{transform:scale(1.14); filter:brightness(1.35);}
      100%{transform:scale(1); filter:brightness(1);}
    }

    @keyframes rowFlash{
      0%{transform:scale(1)}
      35%{transform:scale(1.015)}
      100%{transform:scale(1)}
    }

    @keyframes leaderFlash{
      0%{transform:scale(1)}
      35%{transform:scale(1.025)}
      100%{transform:scale(1)}
    }

    .green{
      --itemAccent:#62ec9f;
      --itemGlow:rgba(83,210,139,.25);
    }
    .gold{
      --itemAccent:#f0ca7c;
      --itemGlow:rgba(226,189,116,.25);
    }
    .red{
      --itemAccent:#ff8b8b;
      --itemGlow:rgba(224,107,107,.25);
    }
    .black{
      --itemAccent:#f0f0f0;
      --itemGlow:rgba(200,200,200,.15);
    }
    .bordeaux{
      --itemAccent:#df7ea8;
      --itemGlow:rgba(181,90,127,.25);
    }
    .blue{
      --itemAccent:#98d1ff;
      --itemGlow:rgba(121,191,255,.25);
    }
    .violet{
      --itemAccent:#c39aff;
      --itemGlow:rgba(178,132,255,.25);
    }
    .orange{
      --itemAccent:#ffc17f;
      --itemGlow:rgba(255,175,97,.25);
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      color:var(--muted);
      font-size:1rem;
    }

    .footer strong{
      color:#f0e6cf;
    }

    @media (max-width: 1280px){
      body{overflow:auto}

      .screen{
        height:auto;
        min-height:100vh;
      }

      .main{
        grid-template-columns:1fr;
      }

      .leader-frame{
        width:min(56%, 320px);
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="title-wrap">
        <img src="Asset%201.svg" alt="Logo La Nuit Magique">
        <div>
          <div class="eyebrow">Écran live</div>
          <h1>La Bataille des Royaumes</h1>
        </div>
      </div>

      <div class="top-right">
        <div class="label">Mode spectacle</div>
        <div class="value">Classement en direct</div>
      </div>
    </div>

    <div class="main">
      <section class="panel leader-panel">
        <div class="leader-top">
          <div class="small">Le royaume dominant</div>
          <h2>Royaume en tête</h2>
        </div>

        <div class="leader-middle">
          <div id="leaderFrame" class="leader-frame top-1">
            <span class="sparkle s1"></span>
            <span class="sparkle s2"></span>
            <span class="sparkle s3"></span>
            <span class="sparkle s4"></span>
            <span class="sparkle s5"></span>
            <span class="sparkle s6"></span>
            <img id="leaderLogo" class="leader-logo" src="Temeriah.png" alt="Leader">
          </div>
        </div>

        <div id="leaderBottom" class="leader-bottom">
          <div class="leader-line">Premier du classement</div>
          <div id="leaderName" class="leader-name">Témeriah</div>
          <div id="leaderScore" class="leader-score">1400 pts</div>
        </div>
      </section>

      <section class="panel ranking-panel">
        <div class="ranking-head">
          <h2>Classement des 8 royaumes</h2>
          <div class="refresh-badge">
            <span class="pulse-dot"></span>
            Actualisation auto
          </div>
        </div>

        <div id="rankingList" class="ranking-list"></div>
      </section>
    </div>

    <div class="footer">
      <div><strong>La Nuit Magique</strong> — Coupe des 8 Royaumes</div>
      <div>Page : <strong>scoreboard.html</strong></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vajvtuxjefyktalirqcf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_aG99lJA0pJtRgUKbP7GRBw_Xz-Mj6C_";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const rankingList = document.getElementById("rankingList");
    const leaderName = document.getElementById("leaderName");
    const leaderScore = document.getElementById("leaderScore");
    const leaderLogo = document.getElementById("leaderLogo");
    const leaderBottom = document.getElementById("leaderBottom");
    const leaderFrame = document.getElementById("leaderFrame");

    const kingdomAssets = {
      "Alcarah": { logo: "Alcarah.png", cls: "green", color: "#62ec9f" },
      "Augustus Nubium Mundus": { logo: "Augustus%20Nubium%20Mundus.png", cls: "gold", color: "#f0ca7c" },
      "Baldezor": { logo: "Baldezor.png", cls: "red", color: "#ff8b8b" },
      "Les Ombres de Grimelfe": { logo: "Grimelfe%20NV.png", cls: "black", color: "#f0f0f0" },
      "Lunerei": { logo: "Lunerei.png", cls: "bordeaux", color: "#df7ea8" },
      "Sappheiros": { logo: "Sappheiros.png", cls: "blue", color: "#98d1ff" },
      "Les Terres de Sang": { logo: "TDS%20NV.png", cls: "violet", color: "#c39aff" },
      "Témeriah": { logo: "Temeriah.png", cls: "orange", color: "#ffc17f" }
    };

    let previousScores = {};
    let firstRender = true;

    function animateValue(element, start, end, suffix = "", duration = 700) {
      if (start === end) {
        element.textContent = `${end}${suffix}`;
        return;
      }

      const startTime = performance.now();

      function step(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(start + (end - start) * eased);
        element.textContent = `${value}${suffix}`;

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          element.textContent = `${end}${suffix}`;
        }
      }

      requestAnimationFrame(step);
    }

    function flash(el, className) {
      el.classList.remove(className);
      void el.offsetWidth;
      el.classList.add(className);
    }

    function renderRanking(sortedData) {
      if (!sortedData || !sortedData.length) {
        rankingList.innerHTML = "";
        leaderName.textContent = "Aucune donnée";
        leaderScore.textContent = "0 pts";
        return;
      }

      const leader = sortedData[0];
      const leaderAsset = kingdomAssets[leader.name] || { logo: "", color: "#f4ddb1" };
      const previousLeaderScore = previousScores[leader.name] ?? leader.score;

      leaderName.textContent = leader.name;
      leaderName.style.color = leaderAsset.color;
      leaderLogo.src = leaderAsset.logo;
      leaderLogo.alt = leader.name;

      if (firstRender) {
        leaderScore.textContent = `${leader.score} pts`;
      } else {
        animateValue(leaderScore, previousLeaderScore, leader.score, " pts", 850);
        if (previousLeaderScore !== leader.score) {
          flash(leaderScore, "score-flash");
          flash(leaderBottom, "leader-flash");
          flash(leaderFrame, "leader-flash");
        }
      }

      rankingList.innerHTML = sortedData.map((row, index) => {
        const asset = kingdomAssets[row.name] || { logo: "", cls: "gold", color: "#f0ca7c" };
        return `
          <article class="ranking-item ${asset.cls} ${index === 0 ? "top-1" : ""}" data-name="${row.name}" data-score="${row.score}">
            <div class="rank-num">${index === 0 ? "👑" : "#" + (index + 1)}</div>
            <div class="rank-logo">
              <img src="${asset.logo}" alt="${row.name}">
            </div>
            <div class="rank-name">
              <span style="color:${asset.color};">${row.name}</span>
            </div>
            <div class="rank-score">${row.score}</div>
          </article>
        `;
      }).join("");

      if (!firstRender) {
        document.querySelectorAll(".ranking-item").forEach((item) => {
          const name = item.dataset.name;
          const newScore = Number(item.dataset.score);
          const oldScore = previousScores[name];

          const scoreEl = item.querySelector(".rank-score");

          if (oldScore == null) {
            scoreEl.textContent = newScore;
            return;
          }

          animateValue(scoreEl, oldScore, newScore, "", 750);

          if (oldScore !== newScore) {
            flash(scoreEl, "score-flash");
            flash(item, "row-flash");
          }
        });
      }

      previousScores = Object.fromEntries(sortedData.map(row => [row.name, row.score]));
      firstRender = false;
    }

    async function loadScores() {
      const { data, error } = await supabaseClient
        .from("kingdoms")
        .select("name, score");

      if (error) {
        console.error("Erreur chargement scoreboard :", error);
        return;
      }

      const sortedData = [...data].sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
      renderRanking(sortedData);
    }

    loadScores();
    setInterval(loadScores, 5000);
  </script>
</body>
</html>
