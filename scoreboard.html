<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard — La Bataille des Royaumes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#04060b;
      --bg2:#0a1020;
      --text:#f7f0e6;
      --muted:#b8af9f;
      --gold:#e0ba73;
      --gold-2:#f3d79b;
      --line:rgba(255,255,255,.08);
      --shadow:0 30px 80px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:"Cormorant Garamond", serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(224,186,115,.12), transparent 28%),
        radial-gradient(circle at 15% 20%, rgba(82,125,255,.10), transparent 20%),
        radial-gradient(circle at 85% 20%, rgba(153,84,255,.10), transparent 20%),
        linear-gradient(180deg, #09101d 0%, #04070d 100%);
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.34;
      background-image:
        radial-gradient(2px 2px at 10% 15%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 20% 75%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(2px 2px at 38% 20%, rgba(255,255,255,.4) 40%, transparent 45%),
        radial-gradient(1px 1px at 59% 12%, rgba(255,255,255,.65) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 74% 70%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(2px 2px at 88% 20%, rgba(255,255,255,.5) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 86% 84%, rgba(255,255,255,.45) 40%, transparent 45%);
    }

    .screen{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      padding:22px;
      position:relative;
      z-index:1;
      gap:18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .title-wrap{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .title-wrap img{
      width:72px;
      height:72px;
      object-fit:contain;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }

    .eyebrow{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.75rem;
      color:var(--gold);
      margin-bottom:6px;
    }

    h1{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:clamp(1.6rem, 3vw, 2.8rem);
      line-height:1;
    }

    .top-right{
      text-align:right;
    }

    .top-right .label{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.72rem;
      color:var(--muted);
    }

    .top-right .value{
      margin-top:4px;
      font-family:"Cinzel", serif;
      font-size:1rem;
      color:#f0e6cf;
    }

    .main{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:22px;
      min-height:0;
    }

    .panel{
      border-radius:34px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.04), transparent 18%),
        radial-gradient(circle at 88% 86%, rgba(255,255,255,.03), transparent 18%);
      pointer-events:none;
    }

    /* LEFT SIDE / CUP */
    .cup-panel{
      padding:28px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      align-items:center;
      text-align:center;
    }

    .cup-top{
      position:relative;
      z-index:1;
    }

    .cup-top .small{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.78rem;
      color:var(--gold);
      margin-bottom:8px;
    }

    .cup-top h2{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:clamp(1.7rem, 3vw, 2.8rem);
      line-height:1.05;
    }

    .cup-stage{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:0;
    }

    .cup-glow{
      position:absolute;
      width:min(42vw, 520px);
      height:min(42vw, 520px);
      border-radius:50%;
      background:radial-gradient(circle, rgba(224,186,115,.22), rgba(224,186,115,.08), transparent 68%);
      filter:blur(10px);
      pointer-events:none;
    }

    .cup-wrap{
      position:relative;
      z-index:1;
      width:min(70%, 500px);
      max-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      filter:drop-shadow(0 24px 32px rgba(0,0,0,.35));
    }

    .cup-svg{
      width:100%;
      height:auto;
      display:block;
    }

    .kingdom-badge{
      position:absolute;
      left:50%;
      top:67%;
      transform:translate(-50%, -50%);
      width:140px;
      height:140px;
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(4px);
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }

    .kingdom-badge img{
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.25));
    }

    .cup-bottom{
      position:relative;
      z-index:1;
      display:grid;
      gap:8px;
    }

    .leader-line{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.76rem;
      color:#f0d9a0;
    }

    .leader-name{
      font-family:"Cinzel", serif;
      font-size:clamp(1.6rem, 2.4vw, 2.6rem);
      color:#fff0cc;
      text-shadow:0 0 18px rgba(224,186,115,.22);
      line-height:1.05;
    }

    .leader-score{
      font-family:"Cinzel", serif;
      font-size:clamp(2.2rem, 4vw, 4rem);
      color:var(--gold-2);
      text-shadow:0 0 22px rgba(224,186,115,.28);
      line-height:1;
    }

    /* RIGHT SIDE / RANKING */
    .right-panel{
      padding:18px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:12px;
      min-height:0;
    }

    .right-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }

    .right-head h2{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:1.2rem;
    }

    .refresh-badge{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      font-family:"Cinzel", serif;
      font-size:.68rem;
      letter-spacing:.06em;
      color:var(--muted);
      white-space:nowrap;
    }

    .ranking-list{
      display:grid;
      grid-template-rows:repeat(8, minmax(0, 1fr));
      gap:8px;
      min-height:0;
    }

    .ranking-item{
      display:grid;
      grid-template-columns:52px 52px 1fr auto;
      align-items:center;
      gap:12px;
      padding:10px 14px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.07);
      min-height:0;
      position:relative;
      overflow:hidden;
    }

    .ranking-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, var(--itemGlow), transparent 60%);
      opacity:.45;
      pointer-events:none;
    }

    .ranking-item.top-1{
      border-color:rgba(224,186,115,.28);
      box-shadow:0 0 0 1px rgba(224,186,115,.08), inset 0 0 18px rgba(224,186,115,.05);
    }

    .rank-num{
      font-family:"Cinzel", serif;
      font-size:1.15rem;
      color:#f1e5c8;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .rank-logo{
      width:48px;
      height:48px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      position:relative;
      z-index:1;
    }

    .rank-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .rank-name{
      font-family:"Cinzel", serif;
      font-size:.88rem;
      line-height:1.15;
      position:relative;
      z-index:1;
    }

    .rank-score{
      font-family:"Cinzel", serif;
      font-size:1.25rem;
      line-height:1;
      color:var(--itemAccent);
      text-shadow:0 0 18px var(--itemGlow);
      min-width:72px;
      text-align:right;
      position:relative;
      z-index:1;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      color:var(--muted);
      font-size:1rem;
    }

    .footer strong{
      color:#f0e6cf;
    }

    .pulse-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#7ef0a8;
      box-shadow:0 0 12px #7ef0a8;
      display:inline-block;
      margin-right:8px;
      animation:pulseDot 1.8s infinite;
    }

    @keyframes pulseDot{
      0%{transform:scale(1);opacity:1}
      50%{transform:scale(1.35);opacity:.65}
      100%{transform:scale(1);opacity:1}
    }

    .green{
      --itemAccent:#62ec9f;
      --itemGlow:rgba(83,210,139,.25);
    }
    .gold{
      --itemAccent:#f0ca7c;
      --itemGlow:rgba(226,189,116,.25);
    }
    .red{
      --itemAccent:#ff8b8b;
      --itemGlow:rgba(224,107,107,.25);
    }
    .black{
      --itemAccent:#f0f0f0;
      --itemGlow:rgba(200,200,200,.16);
    }
    .bordeaux{
      --itemAccent:#df7ea8;
      --itemGlow:rgba(181,90,127,.25);
    }
    .blue{
      --itemAccent:#98d1ff;
      --itemGlow:rgba(121,191,255,.25);
    }
    .violet{
      --itemAccent:#c39aff;
      --itemGlow:rgba(178,132,255,.25);
    }
    .orange{
      --itemAccent:#ffc17f;
      --itemGlow:rgba(255,175,97,.25);
    }

    @media (max-width: 1200px){
      .main{
        grid-template-columns:1fr;
      }

      body{
        overflow:auto;
      }

      .screen{
        height:auto;
        min-height:100vh;
      }

      .ranking-list{
        grid-template-rows:none;
      }

      .cup-wrap{
        width:min(70%, 380px);
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="title-wrap">
        <img src="Asset%201.svg" alt="Logo La Nuit Magique">
        <div>
          <div class="eyebrow">Écran live</div>
          <h1>La Bataille des Royaumes</h1>
        </div>
      </div>

      <div class="top-right">
        <div class="label">Mode spectacle</div>
        <div class="value">Classement en direct</div>
      </div>
    </div>

    <div class="main">
      <section class="panel cup-panel">
        <div class="cup-top">
          <div class="small">La coupe des royaumes</div>
          <h2>Le trône du vainqueur</h2>
        </div>

        <div class="cup-stage">
          <div class="cup-glow"></div>

          <div class="cup-wrap">
            <svg class="cup-svg" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="goldMain" x1="0" x2="1">
                  <stop offset="0%" stop-color="#7a5622"/>
                  <stop offset="20%" stop-color="#c99a4c"/>
                  <stop offset="50%" stop-color="#f1d08d"/>
                  <stop offset="80%" stop-color="#b98535"/>
                  <stop offset="100%" stop-color="#5e3d12"/>
                </linearGradient>

                <linearGradient id="goldDark" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="#d8b06b"/>
                  <stop offset="100%" stop-color="#7b551f"/>
                </linearGradient>

                <radialGradient id="shine" cx="50%" cy="30%" r="60%">
                  <stop offset="0%" stop-color="rgba(255,255,255,.9)"/>
                  <stop offset="40%" stop-color="rgba(255,255,255,.18)"/>
                  <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                </radialGradient>

                <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="25" stdDeviation="22" flood-color="rgba(0,0,0,.35)"/>
                </filter>
              </defs>

              <g filter="url(#shadow)">
                <!-- blades / throne vibe -->
                <g opacity=".9">
                  <path d="M130 178 L165 55 L210 188 Z" fill="url(#goldDark)" opacity=".55"/>
                  <path d="M195 168 L235 28 L280 178 Z" fill="url(#goldDark)" opacity=".62"/>
                  <path d="M260 160 L300 18 L340 160 Z" fill="url(#goldDark)" opacity=".74"/>
                  <path d="M320 168 L365 28 L405 178 Z" fill="url(#goldDark)" opacity=".62"/>
                  <path d="M390 178 L435 55 L470 188 Z" fill="url(#goldDark)" opacity=".55"/>
                </g>

                <!-- handles -->
                <path d="M158 205
                         C80 210, 62 276, 94 325
                         C118 362, 175 363, 210 334"
                      fill="none" stroke="url(#goldMain)" stroke-width="22" stroke-linecap="round"/>
                <path d="M442 205
                         C520 210, 538 276, 506 325
                         C482 362, 425 363, 390 334"
                      fill="none" stroke="url(#goldMain)" stroke-width="22" stroke-linecap="round"/>

                <!-- upper cup -->
                <path d="M150 170
                         Q300 122 450 170
                         L412 330
                         Q300 370 188 330
                         Z"
                      fill="url(#goldMain)" stroke="#f0d08c" stroke-width="3"/>

                <!-- decorative rim -->
                <path d="M145 166 Q300 112 455 166"
                      fill="none" stroke="#f5e1b0" stroke-width="8" stroke-linecap="round"/>

                <!-- center plate -->
                <path d="M225 240
                         Q300 210 375 240
                         L355 318
                         Q300 338 245 318
                         Z"
                      fill="#2d1c09" opacity=".55" stroke="#f0d08c" stroke-width="2"/>

                <!-- stem -->
                <path d="M255 334
                         Q300 365 345 334
                         L326 470
                         Q300 485 274 470 Z"
                      fill="url(#goldMain)" stroke="#e7c57d" stroke-width="2"/>

                <!-- base top -->
                <ellipse cx="300" cy="505" rx="118" ry="28" fill="url(#goldMain)" stroke="#f0d08c" stroke-width="3"/>
                <!-- base body -->
                <path d="M205 505 L395 505 L430 595 Q300 640 170 595 Z"
                      fill="url(#goldDark)" stroke="#e4be74" stroke-width="3"/>
                <!-- base bottom -->
                <ellipse cx="300" cy="596" rx="136" ry="34" fill="url(#goldMain)" stroke="#f0d08c" stroke-width="3"/>

                <!-- front shine -->
                <ellipse cx="300" cy="250" rx="115" ry="92" fill="url(#shine)" opacity=".38"/>
              </g>
            </svg>

            <div class="kingdom-badge">
              <img id="leaderLogo" src="Alcarah.png" alt="Leader">
            </div>
          </div>
        </div>

        <div class="cup-bottom">
          <div class="leader-line">Royaume en tête</div>
          <div id="leaderName" class="leader-name">Alcarah</div>
          <div id="leaderScore" class="leader-score">0 pts</div>
        </div>
      </section>

      <section class="panel right-panel">
        <div class="right-head">
          <h2>Classement des 8 royaumes</h2>
          <div class="refresh-badge">
            <span class="pulse-dot"></span>Actualisation auto
          </div>
        </div>

        <div id="rankingList" class="ranking-list"></div>
      </section>
    </div>

    <div class="footer">
      <div><strong>La Nuit Magique</strong> — Coupe des 8 Royaumes</div>
      <div>Page : <strong>scoreboard.html</strong></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vajvtuxjefyktalirqcf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_aG99lJA0pJtRgUKbP7GRBw_Xz-Mj6C_";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const rankingList = document.getElementById("rankingList");
    const leaderName = document.getElementById("leaderName");
    const leaderScore = document.getElementById("leaderScore");
    const leaderLogo = document.getElementById("leaderLogo");

    const kingdomAssets = {
      "Alcarah": { logo: "Alcarah.png", cls: "green" },
      "Augustus Nubium Mundus": { logo: "Augustus%20Nubium%20Mundus.png", cls: "gold" },
      "Baldezor": { logo: "Baldezor.png", cls: "red" },
      "Les Ombres de Grimelfe": { logo: "Grimelfe%20NV.png", cls: "black" },
      "Lunerei": { logo: "Lunerei.png", cls: "bordeaux" },
      "Sappheiros": { logo: "Sappheiros.png", cls: "blue" },
      "Les Terres de Sang": { logo: "TDS%20NV.png", cls: "violet" },
      "Témeriah": { logo: "Temeriah.png", cls: "orange" }
    };

    function renderRanking(sortedData) {
      if (!sortedData || !sortedData.length) {
        rankingList.innerHTML = "";
        leaderName.textContent = "Aucune donnée";
        leaderScore.textContent = "0 pts";
        return;
      }

      const leader = sortedData[0];
      const leaderAsset = kingdomAssets[leader.name] || { logo: "", cls: "gold" };

      leaderName.textContent = leader.name;
      leaderScore.textContent = `${leader.score} pts`;
      leaderLogo.src = leaderAsset.logo;
      leaderLogo.alt = leader.name;

      rankingList.innerHTML = sortedData.map((row, index) => {
        const asset = kingdomAssets[row.name] || { logo: "", cls: "gold" };

        return `
          <article class="ranking-item ${asset.cls} ${index === 0 ? "top-1" : ""}">
            <div class="rank-num">${index === 0 ? "👑" : "#" + (index + 1)}</div>
            <div class="rank-logo">
              <img src="${asset.logo}" alt="${row.name}">
            </div>
            <div class="rank-name">${row.name}</div>
            <div class="rank-score">${row.score}</div>
          </article>
        `;
      }).join("");
    }

    async function loadScores() {
      const { data, error } = await supabaseClient
        .from("kingdoms")
        .select("name, score");

      if (error) {
        console.error("Erreur chargement scoreboard :", error);
        return;
      }

      const sortedData = [...data].sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
      renderRanking(sortedData);
    }

    loadScores();
    setInterval(loadScores, 5000);
  </script>
</body>
</html>
