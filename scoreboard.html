<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard — La Bataille des Royaumes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#f7f0e6;
      --muted:#b8af9f;
      --gold:#e0ba73;
      --gold-soft:#f4ddb1;
      --line:rgba(255,255,255,.08);
      --panel-bg:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      --shadow:0 30px 80px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:"Cormorant Garamond", serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(224,186,115,.12), transparent 28%),
        radial-gradient(circle at 15% 20%, rgba(82,125,255,.10), transparent 20%),
        radial-gradient(circle at 85% 20%, rgba(153,84,255,.10), transparent 20%),
        linear-gradient(180deg, #09101d 0%, #04070d 100%);
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.32;
      background-image:
        radial-gradient(2px 2px at 10% 15%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 20% 75%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(2px 2px at 38% 20%, rgba(255,255,255,.4) 40%, transparent 45%),
        radial-gradient(1px 1px at 59% 12%, rgba(255,255,255,.65) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 74% 70%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(2px 2px at 88% 20%, rgba(255,255,255,.5) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 86% 84%, rgba(255,255,255,.45) 40%, transparent 45%);
    }

    .screen{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:18px;
      padding:24px;
      position:relative;
      z-index:1;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
    }

    .title-wrap{
      display:flex;
      align-items:flex-start;
      gap:16px;
    }

    .title-wrap img{
      width:84px;
      height:84px;
      object-fit:contain;
      flex-shrink:0;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
    }

    .eyebrow{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.75rem;
      color:var(--gold);
      margin-bottom:6px;
    }

    h1{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:clamp(1.8rem, 3vw, 3rem);
      line-height:1;
    }

    .top-right{
      text-align:right;
      padding-top:8px;
    }

    .top-right .label{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.72rem;
      color:var(--muted);
    }

    .top-right .value{
      margin-top:4px;
      font-family:"Cinzel", serif;
      font-size:1rem;
      color:#f0e6cf;
    }

    .main{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:24px;
      min-height:0;
    }

    .panel{
      border-radius:34px;
      background:var(--panel-bg);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      min-height:0;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.04), transparent 18%),
        radial-gradient(circle at 88% 86%, rgba(255,255,255,.03), transparent 18%);
      pointer-events:none;
    }

    /* LEFT PANEL */
    .hero-panel{
      padding:24px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      justify-items:center;
      align-items:center;
      text-align:center;
      position:relative;
      isolation:isolate;
    }

    .hero-top,
    .hero-middle,
    .hero-bottom{
      width:100%;
      display:grid;
      justify-items:center;
      align-items:center;
      text-align:center;
      position:relative;
      z-index:2;
    }

    .hero-top .small{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.8rem;
      color:var(--gold);
      margin-bottom:10px;
      text-align:center;
    }

    .hero-top h2{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:clamp(2rem, 3.3vw, 3.4rem);
      line-height:1.03;
      text-align:center;
    }

    .throne-wrap{
      position:relative;
      width:100%;
      height:100%;
      min-height:320px;
      display:grid;
      place-items:center;
    }

    .throne-glow{
      position:absolute;
      inset:auto;
      width:70%;
      aspect-ratio:1/1;
      border-radius:50%;
      background:radial-gradient(circle, rgba(224,186,115,.22), rgba(224,186,115,.08), transparent 72%);
      filter:blur(18px);
      pointer-events:none;
      z-index:0;
    }

    .throne-img{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:min(76%, 620px);
      max-height:100%;
      object-fit:contain;
      object-position:center;
      z-index:1;
      filter:drop-shadow(0 28px 40px rgba(0,0,0,.34));
      pointer-events:none;
      user-select:none;
    }

    .leader-logo-box{
      position:relative;
      z-index:2;
      width:150px;
      height:150px;
      border-radius:28px;
      padding:16px;
      display:grid;
      place-items:center;
      background:rgba(10,12,20,.30);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter:blur(6px);
      box-shadow:0 18px 36px rgba(0,0,0,.28);
    }

    .leader-logo-box img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      display:block;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.24));
    }

    .hero-bottom{
      gap:8px;
    }

    .leader-line{
      font-family:"Cinzel", serif;
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.78rem;
      color:#f0d9a0;
      text-align:center;
    }

    .leader-name{
      font-family:"Cinzel", serif;
      font-size:clamp(2rem, 3vw, 3.1rem);
      line-height:1.05;
      text-align:center;
      max-width:92%;
      text-wrap:balance;
    }

    .leader-score{
      font-family:"Cinzel", serif;
      font-size:clamp(3rem, 5vw, 4.8rem);
      line-height:1;
      text-align:center;
      color:var(--gold-soft);
      text-shadow:0 0 22px rgba(224,186,115,.25);
    }

    /* RIGHT PANEL */
    .right-panel{
      padding:18px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:14px;
      min-height:0;
    }

    .right-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }

    .right-head h2{
      margin:0;
      font-family:"Cinzel", serif;
      font-size:1.28rem;
    }

    .refresh-badge{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      font-family:"Cinzel", serif;
      font-size:.72rem;
      letter-spacing:.06em;
      color:var(--muted);
      white-space:nowrap;
    }

    .pulse-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#7ef0a8;
      box-shadow:0 0 12px #7ef0a8;
      animation:pulseDot 1.8s infinite;
      flex-shrink:0;
    }

    .ranking-list{
      display:grid;
      grid-template-rows:repeat(8, minmax(0, 1fr));
      gap:10px;
      min-height:0;
    }

    .ranking-item{
      display:grid;
      grid-template-columns:74px 62px minmax(0,1fr) 110px;
      align-items:center;
      gap:14px;
      padding:10px 18px;
      min-height:72px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.07);
      position:relative;
      overflow:hidden;
    }

    .ranking-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, var(--itemGlow), transparent 68%);
      opacity:.42;
      pointer-events:none;
    }

    .ranking-item.top-1{
      border-color:rgba(224,186,115,.30);
      box-shadow:0 0 0 1px rgba(224,186,115,.08), inset 0 0 20px rgba(224,186,115,.05);
    }

    .rank-num{
      position:relative;
      z-index:1;
      display:grid;
      place-items:center;
      font-family:"Cinzel", serif;
      font-size:1.18rem;
      color:#f1e5c8;
      text-align:center;
      height:100%;
    }

    .rank-logo{
      position:relative;
      z-index:1;
      width:54px;
      height:54px;
      justify-self:center;
      align-self:center;
      display:grid;
      place-items:center;
      padding:7px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .rank-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      display:block;
      margin:0 auto;
    }

    .rank-name{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      min-width:0;
      height:100%;
      font-family:"Cinzel", serif;
      font-size:1rem;
      line-height:1.12;
    }

    .rank-name span{
      display:block;
      width:100%;
      text-wrap:balance;
    }

    .rank-score{
      position:relative;
      z-index:1;
      display:grid;
      align-items:center;
      justify-items:end;
      height:100%;
      text-align:right;
      font-family:"Cinzel", serif;
      font-size:1.55rem;
      line-height:1;
      color:var(--itemAccent);
      text-shadow:0 0 18px var(--itemGlow);
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      color:var(--muted);
      font-size:1rem;
    }

    .footer strong{
      color:#f0e6cf;
    }

    @keyframes pulseDot{
      0%{transform:scale(1);opacity:1}
      50%{transform:scale(1.35);opacity:.65}
      100%{transform:scale(1);opacity:1}
    }

    .green{
      --itemAccent:#62ec9f;
      --itemGlow:rgba(83,210,139,.25);
    }
    .gold{
      --itemAccent:#f0ca7c;
      --itemGlow:rgba(226,189,116,.25);
    }
    .red{
      --itemAccent:#ff8b8b;
      --itemGlow:rgba(224,107,107,.25);
    }
    .black{
      --itemAccent:#f0f0f0;
      --itemGlow:rgba(200,200,200,.15);
    }
    .bordeaux{
      --itemAccent:#df7ea8;
      --itemGlow:rgba(181,90,127,.25);
    }
    .blue{
      --itemAccent:#98d1ff;
      --itemGlow:rgba(121,191,255,.25);
    }
    .violet{
      --itemAccent:#c39aff;
      --itemGlow:rgba(178,132,255,.25);
    }
    .orange{
      --itemAccent:#ffc17f;
      --itemGlow:rgba(255,175,97,.25);
    }

    @media (max-width: 1280px){
      body{overflow:auto}

      .screen{
        height:auto;
        min-height:100vh;
      }

      .main{
        grid-template-columns:1fr;
      }

      .ranking-list{
        grid-template-rows:none;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="title-wrap">
        <img src="Asset%201.svg" alt="Logo La Nuit Magique">
        <div>
          <div class="eyebrow">Écran live</div>
          <h1>La Bataille des Royaumes</h1>
        </div>
      </div>

      <div class="top-right">
        <div class="label">Mode spectacle</div>
        <div class="value">Classement en direct</div>
      </div>
    </div>

    <div class="main">
      <section class="panel hero-panel">
        <div class="hero-top">
          <div class="small">Le royaume dominant</div>
          <h2>Le Trône du Vainqueur</h2>
        </div>

        <div class="hero-middle">
          <div class="throne-wrap">
            <div class="throne-glow"></div>
            <img class="throne-img" src="TRONE%20NM.png" alt="Trône">
            <div class="leader-logo-box">
              <img id="leaderLogo" src="Temeriah.png" alt="Leader">
            </div>
          </div>
        </div>

        <div class="hero-bottom">
          <div class="leader-line">Royaume en tête</div>
          <div id="leaderName" class="leader-name">Témeriah</div>
          <div id="leaderScore" class="leader-score">1400 pts</div>
        </div>
      </section>

      <section class="panel right-panel">
        <div class="right-head">
          <h2>Classement des 8 royaumes</h2>
          <div class="refresh-badge">
            <span class="pulse-dot"></span>
            Actualisation auto
          </div>
        </div>

        <div id="rankingList" class="ranking-list"></div>
      </section>
    </div>

    <div class="footer">
      <div><strong>La Nuit Magique</strong> — Coupe des 8 Royaumes</div>
      <div>Page : <strong>scoreboard.html</strong></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vajvtuxjefyktalirqcf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_aG99lJA0pJtRgUKbP7GRBw_Xz-Mj6C_";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const rankingList = document.getElementById("rankingList");
    const leaderName = document.getElementById("leaderName");
    const leaderScore = document.getElementById("leaderScore");
    const leaderLogo = document.getElementById("leaderLogo");

    const kingdomAssets = {
      "Alcarah": { logo: "Alcarah.png", cls: "green", color: "#62ec9f" },
      "Augustus Nubium Mundus": { logo: "Augustus%20Nubium%20Mundus.png", cls: "gold", color: "#f0ca7c" },
      "Baldezor": { logo: "Baldezor.png", cls: "red", color: "#ff8b8b" },
      "Les Ombres de Grimelfe": { logo: "Grimelfe%20NV.png", cls: "black", color: "#f0f0f0" },
      "Lunerei": { logo: "Lunerei.png", cls: "bordeaux", color: "#df7ea8" },
      "Sappheiros": { logo: "Sappheiros.png", cls: "blue", color: "#98d1ff" },
      "Les Terres de Sang": { logo: "TDS%20NV.png", cls: "violet", color: "#c39aff" },
      "Témeriah": { logo: "Temeriah.png", cls: "orange", color: "#ffc17f" }
    };

    function renderRanking(sortedData) {
      if (!sortedData || !sortedData.length) {
        rankingList.innerHTML = "";
        leaderName.textContent = "Aucune donnée";
        leaderScore.textContent = "0 pts";
        return;
      }

      const leader = sortedData[0];
      const leaderAsset = kingdomAssets[leader.name] || { logo: "", color: "#f4ddb1" };

      leaderName.textContent = leader.name;
      leaderName.style.color = leaderAsset.color;
      leaderScore.textContent = `${leader.score} pts`;
      leaderLogo.src = leaderAsset.logo;
      leaderLogo.alt = leader.name;

      rankingList.innerHTML = sortedData.map((row, index) => {
        const asset = kingdomAssets[row.name] || { logo: "", cls: "gold", color: "#f0ca7c" };

        return `
          <article class="ranking-item ${asset.cls} ${index === 0 ? "top-1" : ""}">
            <div class="rank-num">${index === 0 ? "👑" : "#" + (index + 1)}</div>
            <div class="rank-logo">
              <img src="${asset.logo}" alt="${row.name}">
            </div>
            <div class="rank-name">
              <span style="color:${asset.color};">${row.name}</span>
            </div>
            <div class="rank-score">${row.score}</div>
          </article>
        `;
      }).join("");
    }

    async function loadScores() {
      const { data, error } = await supabaseClient
        .from("kingdoms")
        .select("name, score");

      if (error) {
        console.error("Erreur chargement scoreboard :", error);
        return;
      }

      const sortedData = [...data].sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
      renderRanking(sortedData);
    }

    loadScores();
    setInterval(loadScores, 5000);
  </script>
</body>
</html>
